name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Verify flake
        run: nix flake check path:.
      - name: Install JavaScript dependencies
        run: nix develop path:. -c just bootstrap
      - name: Run deterministic quality checks
        run: nix develop path:. -c just check

  browser:
    name: browser (${{ matrix.browser }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Install JavaScript dependencies
        run: nix develop path:. -c just bootstrap
      - name: Install browser system dependencies
        run: nix develop path:. -c pnpm exec playwright install-deps ${{ matrix.browser }}
      - name: Run browser production tests
        run: nix develop path:. -c env PLAYWRIGHT_CROSS_BROWSER=1 pnpm exec playwright test --config tests/browser/playwright.config.ts --project=${{ matrix.browser }}

  dependencies:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Install JavaScript dependencies
        run: nix develop path:. -c just bootstrap
      - name: Audit locked dependencies
        run: nix develop path:. -c just dependency-check

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, browser, dependencies]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Install JavaScript dependencies
        run: nix develop path:. -c just bootstrap
      - name: Build static application
        run: nix develop path:. -c just build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
